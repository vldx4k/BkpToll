# config.yaml - приклад
store_dir: "backups_store"
db_path: "backup_index.sqlite"
include:
  - "./data"   # вкажіть шляхи для бекапу
exclude:
  - "./cache"
author: "admin"
encryption:
  enabled: false
  password: ""        # якщо enabled=true, вкажіть пароль
schedule:
  interval_seconds: 86400   # щодня (для вбудованого планувальника)
retention:
  keep_last: 7
  max_age_days: 30
block_size: 65536
temp_dir: "tmp"
